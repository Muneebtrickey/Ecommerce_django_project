{% extends "store/layout/main.html" %}

{% block title %} Login | E-Shop {% endblock %}

{% block content %}
<div class="min-h-[80vh] flex flex-col justify-center py-12 sm:px-6 lg:px-8 bg-gray-50">
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <div class="text-center">
            <h2 class="text-4xl font-black text-gray-900 tracking-tighter uppercase">Welcome Back</h2>
            <p class="mt-2 text-sm text-gray-500 italic">
                Enter your credentials to access your account
            </p>
        </div>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
        <div class="bg-white py-10 px-6 shadow-2xl shadow-gray-200 rounded-[2.5rem] border border-gray-100 sm:px-12 relative overflow-hidden">
            <!-- Decorative element -->
            <div class="absolute top-0 right-0 -mt-4 -mr-4 w-24 h-24 bg-accent/10 rounded-full blur-2xl"></div>
            
            <form class="space-y-6" action="{% url 'loginpage' %}" method="POST">
                {% csrf_token %}
                <div>
                    <label for="username" class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2">Username</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                            <i class="fa-solid fa-user text-sm"></i>
                        </div>
                        <input id="username" name="username" type="text" required class="appearance-none block w-full pl-11 pr-4 py-3 border border-gray-200 rounded-xl shadow-sm placeholder-gray-400 focus:outline-none focus:ring-accent focus:border-accent sm:text-sm transition" placeholder="johndoe">
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2">Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                            <i class="fa-solid fa-lock text-sm"></i>
                        </div>
                        <input id="password" name="password" type="password" required class="appearance-none block w-full pl-11 pr-4 py-3 border border-gray-200 rounded-xl shadow-sm placeholder-gray-400 focus:outline-none focus:ring-accent focus:border-accent sm:text-sm transition" placeholder="••••••••">
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-accent focus:ring-accent border-gray-300 rounded transition">
                        <label for="remember-me" class="ml-2 block text-sm text-gray-600 font-medium">
                            Remember me
                        </label>
                    </div>

                    <div class="text-sm">
                        <a href="#" class="font-bold text-accent hover:text-teal-600 transition italic">
                            Forgot password?
                        </a>
                    </div>
                </div>

                <div>
                    <button type="submit" class="w-full flex justify-center py-4 px-4 border border-transparent rounded-2xl shadow-xl shadow-teal-50 text-lg font-black text-white bg-accent hover:bg-teal-600 focus:outline-none focus:ring-4 focus:ring-teal-100 transition duration-300 uppercase tracking-widest">
                        Sign In
                    </button>
                </div>
            </form>

            <div class="mt-8">
                <div class="relative">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-100"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-4 bg-white text-gray-400 font-bold uppercase tracking-widest text-[10px]">New here?</span>
                    </div>
                </div>

                <div class="mt-6 text-center">
                    <a href="{% url 'register' %}" class="inline-flex items-center font-black text-gray-900 hover:text-accent transition uppercase tracking-widest text-sm">
                        Create an account <i class="fa-solid fa-arrow-right ml-2 text-xs"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
